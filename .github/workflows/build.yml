# Build the Digital Garden site and deploy it to GitHub Pages
name: Build and Deploy

# Trigger this workflow whenever code is pushed to the main branch
on:
  push:
    branches: [ "main" ]

# Give the workflow permission to write to the repo
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    steps:
    # Check out the repository code
    - uses: actions/checkout@v4

    # Set up Node.js environment
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    # Install dependencies
    - run: npm install

    # Build the site (outputs to /dist folder)
    - run: npm run build

    # Deploy the built site to the gh-pages branch
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist
